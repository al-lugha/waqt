<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>كم الساعة؟ — Arabic Time Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0c1c12; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* ── DU'A SPLASH ── */
  .dua-screen {
    position: fixed;
    inset: 0;
    background: #0c1c12;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 2.5rem 2rem;
    text-align: center;
    transition: opacity 0.6s ease;
  }
  .dua-screen.hidden { opacity: 0; pointer-events: none; }

  .dua-glow {
    width: 190px; height: 190px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
  }
  .dua-arabic {
    font-family: 'Amiri', serif;
    font-size: 36px;
    color: #c9a84c;
    line-height: 1.5;
    direction: rtl;
  }
  .dua-english {
    font-size: 20px;
    color: #e8dfc0;
    font-weight: 400;
    margin-bottom: 6px;
    line-height: 1.5;
  }
  .dua-transliteration {
    font-size: 14px;
    color: #7a9e82;
    margin-bottom: 2.5rem;
    font-style: italic;
  }
  .dua-divider {
    width: 48px; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c, transparent);
    margin: 0 auto 2.5rem;
  }
  .dua-btn {
    background: #c9a84c;
    color: #0c1c12;
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
  }
  .dua-btn:hover { background: #dbb95e; }
  .dua-btn:active { transform: scale(0.96); }

  /* ── MAIN APP ── */
  .main {
    width: 100%;
    max-width: 440px;
    padding: 0 0 40px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .top-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 60px 20px 18px;
  }
  .app-title {
    font-family: 'Amiri', serif;
    font-size: 28px;
    color: #c9a84c;
    direction: rtl;
    line-height: 1;
  }
  .app-sub {
    font-size: 11px;
    color: #7a9e82;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .question-counter {
    font-size: 13px;
    color: #7a9e82;
    font-weight: 500;
  }

  /* ── SCORE ROW ── */
  .score-row {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    margin-bottom: 18px;
  }
  .score-pill {
    flex: 1;
    background: #162b1e;
    border: 0.5px solid #2a4a32;
    border-radius: 16px;
    padding: 11px 6px;
    text-align: center;
  }
  .score-pill-label {
    font-size: 9px;
    color: #7a9e82;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 4px;
  }
  .score-pill-val { font-size: 22px; font-weight: 700; color: #e8dfc0; }
  .score-pill-val.g { color: #5ecb80; }
  .score-pill-val.r { color: #e07070; }
  .score-pill-val.gold { color: #c9a84c; }

  /* ── TIME CARD ── */
  .time-card {
    margin: 0 16px 18px;
    background: #162b1e;
    border: 0.5px solid #2a4a32;
    border-radius: 26px;
    padding: 36px 20px 28px;
    text-align: center;
    position: relative;
    transition: box-shadow 0.3s;
  }
  .time-card-eyebrow {
    font-size: 10px;
    color: #7a9e82;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .time-big {
    font-size: 80px;
    font-weight: 700;
    color: #f0e8cc;
    letter-spacing: 3px;
    line-height: 1;
    margin-bottom: 16px;
    font-variant-numeric: tabular-nums;
  }
  .period-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #c9a84c;
    color: #0c1c12;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 50px;
    letter-spacing: 0.04em;
  }
  .period-arabic { font-family: 'Amiri', serif; font-size: 16px; font-weight: 700; }

  /* ── QUESTION LABEL ── */
  .q-label {
    font-family: 'Amiri', serif;
    font-size: 18px;
    color: #c9a84c;
    text-align: center;
    padding: 0 20px;
    margin-bottom: 14px;
    direction: rtl;
  }

  /* ── CHOICES ── */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 16px;
    margin-bottom: 14px;
  }
  .choice-btn {
    background: #162b1e;
    border: 0.5px solid #2a4a32;
    border-radius: 20px;
    padding: 18px 12px;
    font-size: 16px;
    font-family: 'Amiri', serif;
    color: #e8dfc0;
    cursor: pointer;
    text-align: center;
    line-height: 1.6;
    direction: rtl;
    min-height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s, border-color 0.12s, transform 0.08s;
    will-change: transform;
  }
  .choice-btn:hover:not(:disabled) {
    background: #1e3d28;
    border-color: #c9a84c;
  }
  .choice-btn:active:not(:disabled) { transform: scale(0.96); }
  .choice-btn.correct {
    background: #163325;
    border: 2px solid #5ecb80;
    color: #9debb5;
  }
  .choice-btn.wrong {
    background: #2e1212;
    border: 2px solid #e07070;
    color: #f0a0a0;
  }
  .choice-btn:disabled { cursor: default; transform: none !important; }

  /* ── FEEDBACK ── */
  .feedback {
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    min-height: 20px;
    padding: 0 20px;
    margin-bottom: 14px;
    color: #7a9e82;
  }
  .feedback.g { color: #5ecb80; }
  .feedback.r { color: #e07070; }

  /* ── NEXT BTN ── */
  .next-btn {
    display: block;
    margin: 0 16px;
    width: calc(100% - 32px);
    padding: 17px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 700;
    background: #c9a84c;
    color: #0c1c12;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.12s, transform 0.08s;
  }
  .next-btn:hover { background: #dbb95e; }
  .next-btn:active { transform: scale(0.97); }

  .glow { box-shadow: 0 0 28px 6px rgba(201,168,76,0.28) !important; }

  @media (min-width: 500px) {
    .time-big { font-size: 96px; }
  }
</style>
</head>
<body>

<!-- DU'A SPLASH -->
<div class="dua-screen" id="duaScreen">
  <div class="dua-glow">
    <div class="dua-arabic">رَفَعَ اللهُ<br/>قَدْرَكَ</div>
  </div>
  <div class="dua-english">May Allah raise your ranks!</div>
  <div class="dua-transliteration">Rafa'a Allāhu qadraka</div>
  <div class="dua-divider"></div>
  <button class="dua-btn" onclick="startQuiz()">Begin — ابدأ</button>
</div>

<!-- MAIN QUIZ -->
<div class="main" id="mainApp">
  <div class="top-bar">
    <div>
      <div class="app-title">كم الساعة؟</div>
      <div class="app-sub">kam is-sā'ah</div>
    </div>
    <div class="question-counter" id="qCounter">Q 1</div>
  </div>

  <div class="score-row">
    <div class="score-pill">
      <div class="score-pill-label">Score</div>
      <div class="score-pill-val gold" id="scoreVal">0</div>
    </div>
    <div class="score-pill">
      <div class="score-pill-label">Correct</div>
      <div class="score-pill-val g" id="correctVal">0</div>
    </div>
    <div class="score-pill">
      <div class="score-pill-label">Wrong</div>
      <div class="score-pill-val r" id="wrongVal">0</div>
    </div>
    <div class="score-pill">
      <div class="score-pill-label">Streak</div>
      <div class="score-pill-val gold" id="streakVal">0</div>
    </div>
  </div>

  <div class="time-card" id="timeCard">
    <div class="time-card-eyebrow">What time is it?</div>
    <div class="time-big" id="timeBig">--:--</div>
    <span class="period-badge">
      <span id="periodEn">--</span>
      <span>·</span>
      <span class="period-arabic" id="periodAr">--</span>
    </span>
  </div>

  <p class="q-label">كيف تقرأ هذا الوقت بالعربية؟</p>
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  <button class="next-btn" onclick="nextQuestion()">Next Question →</button>
</div>

<script>
const HOUR_WORDS = [
  '','الواحدة','الثانية','الثالثة','الرابعة','الخامسة','السادسة',
  'السابعة','الثامنة','التاسعة','العاشرة','الحادية عشرة','الثانية عشرة'
];

/*
  MINUTE RULES (teacher's method):
  ─────────────────────────────────
  PAST side (m = 1–30):
    1        → دقيقة واحدة      (singular)
    2        → دقيقتان           (dual)
    3–29     → X دقائق           (daqa'iq — plural), EXCEPT:
    15       → الربع             (rub' — fraction)
    20       → الثلث             (thuluth — fraction)
    30       → النصف             (nisf — fraction)

  TO side (m = 31–59), work from next hour:
    rem 1    → إلا دقيقة واحدة
    rem 2    → إلا دقيقتين
    rem 3–29 → إلا X دقائق,    EXCEPT:
    rem 15   → إلا الربع
    rem 20   → إلا الثلث
*/

function numberWord(n) {
  // returns Arabic number word for 3–29 (for use with دقائق)
  const map = {
    3:'ثلاث', 4:'أربع', 5:'خمس', 6:'ست', 7:'سبع', 8:'ثماني', 9:'تسع', 10:'عشر',
    11:'إحدى عشرة', 12:'اثنتا عشرة', 13:'ثلاث عشرة', 14:'أربع عشرة',
    16:'ست عشرة', 17:'سبع عشرة', 18:'ثماني عشرة', 19:'تسع عشرة',
    21:'إحدى وعشرون', 22:'اثنتان وعشرون', 23:'ثلاث وعشرون', 24:'أربع وعشرون',
    25:'خمس وعشرون', 26:'ست وعشرون', 27:'سبع وعشرون', 28:'ثماني وعشرون', 29:'تسع وعشرون'
  };
  return map[n] || String(n);
}

function pastWord(m) {
  if (m === 1)  return 'دقيقة واحدة';
  if (m === 2)  return 'دقيقتان';
  if (m === 15) return 'الربع';
  if (m === 20) return 'الثلث';
  if (m === 30) return 'النصف';
  return numberWord(m) + ' دقائق';
}

function toWord(rem) {
  if (rem === 1)  return 'دقيقة واحدة';
  if (rem === 2)  return 'دقيقتين';
  if (rem === 15) return 'الربع';
  if (rem === 20) return 'الثلث';
  return numberWord(rem) + ' دقائق';
}

function timeToArabic(h, m, isAm) {
  let h12    = h % 12 || 12;
  let period = isAm ? 'صباحاً' : 'مساءً';
  let hourW  = HOUR_WORDS[h12];
  let nextHW = HOUR_WORDS[(h12 % 12) + 1];

  if (m === 0)  return `الساعة ${hourW} ${period} تماماً`;
  if (m <= 30)  return `الساعة ${hourW} و${pastWord(m)} ${period}`;

  let rem = 60 - m;
  return `الساعة ${nextHW} إلا ${toWord(rem)} ${period}`;
}

function randomTime() {
  let h       = Math.floor(Math.random() * 12) + 1;
  let isAm    = Math.random() < 0.5;
  let buckets = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
  let m       = buckets[Math.floor(Math.random() * buckets.length)];
  return { h, m, isAm };
}

function shuffle(arr) {
  let a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    let j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateChoices(h, m, isAm) {
  let correct = timeToArabic(h, m, isAm);
  let pool    = new Set([correct]);
  let tries   = 0;
  while (pool.size < 4 && tries < 100) {
    let { h: dh, m: dm, isAm: dam } = randomTime();
    if (dh === h && dm === m && dam === isAm) { tries++; continue; }
    let d = timeToArabic(dh, dm, dam);
    if (!pool.has(d)) pool.add(d);
    tries++;
  }
  let arr = Array.from(pool);
  let ex  = [[3,15,true],[7,30,false],[11,20,true],[5,0,false],[9,45,true],[2,50,false]];
  for (let [eh, em, eam] of ex) {
    if (arr.length >= 4) break;
    let e = timeToArabic(eh, em, eam);
    if (!arr.includes(e)) arr.push(e);
  }
  let shuffled = shuffle(arr);
  return { choices: shuffled, correctIdx: shuffled.indexOf(correct) };
}

let state = { score: 0, correct: 0, wrong: 0, streak: 0, answered: false, correctIdx: 0, qNum: 1 };

function startQuiz() {
  document.getElementById('duaScreen').classList.add('hidden');
  setTimeout(() => { document.getElementById('mainApp').style.opacity = '1'; }, 200);
  nextQuestion();
}

function nextQuestion() {
  let { h, m, isAm } = randomTime();
  state.answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className   = 'feedback';
  document.getElementById('timeCard').classList.remove('glow');
  document.getElementById('qCounter').textContent = `Q ${state.qNum}`;

  document.getElementById('timeBig').textContent  = `${h}:${String(m).padStart(2, '0')}`;
  document.getElementById('periodEn').textContent = isAm ? 'AM' : 'PM';
  document.getElementById('periodAr').textContent = isAm ? 'صباحاً' : 'مساءً';

  let { choices, correctIdx } = generateChoices(h, m, isAm);
  state.correctIdx = correctIdx;

  let div = document.getElementById('choices');
  div.innerHTML = '';
  choices.forEach((c, i) => {
    let btn         = document.createElement('button');
    btn.className   = 'choice-btn';
    btn.textContent = c;
    btn.onclick     = () => answer(i);
    div.appendChild(btn);
  });
}

function answer(idx) {
  if (state.answered) return;
  state.answered = true;
  state.qNum++;
  let btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  let fb = document.getElementById('feedback');

  if (idx === state.correctIdx) {
    btns[idx].classList.add('correct');
    state.score += 10 + state.streak * 2;
    state.correct++;
    state.streak++;
    fb.textContent = state.streak >= 3
      ? `✦ Correct! Streak ${state.streak} — +${10 + (state.streak - 1) * 2} pts`
      : '✦ Correct!';
    fb.className = 'feedback g';
    if (state.streak >= 3) document.getElementById('timeCard').classList.add('glow');
  } else {
    btns[idx].classList.add('wrong');
    btns[state.correctIdx].classList.add('correct');
    state.wrong++;
    state.streak = 0;
    fb.textContent = '✗ Incorrect — correct answer highlighted';
    fb.className   = 'feedback r';
  }

  document.getElementById('scoreVal').textContent  = state.score;
  document.getElementById('correctVal').textContent = state.correct;
  document.getElementById('wrongVal').textContent   = state.wrong;
  document.getElementById('streakVal').textContent  = state.streak;
}
</script>
</body>
</html>
